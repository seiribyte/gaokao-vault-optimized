name: Deploy

on:
  workflow_run:
    workflows: ["Main"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Docker Compose server
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Check deployment configuration
        id: deploy-config
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          missing=""
          for name in DEPLOY_HOST DEPLOY_PORT DEPLOY_USER DEPLOY_PATH DEPLOY_SSH_KEY; do
            if [[ -z "${!name}" ]]; then
              missing="${missing}${missing:+, }${name}"
            fi
          done

          if [[ -n "$missing" ]]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping deployment; missing repository secrets: $missing"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Add SSH key
        if: steps.deploy-config.outputs.configured == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy with Docker Compose
        if: steps.deploy-config.outputs.configured == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" << EOF
          set -e

          cd "$DEPLOY_PATH"

          git fetch origin main
          git reset --hard origin/main

          docker compose build crawler scheduler
          docker compose up -d db minio
          docker compose run --rm crawler init-db
          docker compose up -d scheduler

          docker compose ps
          EOF
