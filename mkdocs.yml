site_name: gaokao-vault
repo_url: https://github.com/lifefloating/gaokao-vault
site_url: https://lifefloating.github.io/gaokao-vault
site_description: 阳光高考全量数据抓取系统
site_author: lifefloating
edit_uri: edit/main/docs/
repo_name: lifefloating/gaokao-vault

nav:
  - 首页: index.md
  - 快速开始: getting-started.md
  - 架构设计: architecture.md
  - 强基计划数据设计: strong-foundation.md
  - 审查基线: review-baseline.md
  - CLI 参考: cli.md
  - API 模块: modules.md

exclude_docs: |
  superpowers/specs/

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: ["src"]

theme:
  name: material
  language: zh
  feature:
    tabs: true
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: 切换暗色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: 切换亮色模式
  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/lifefloating/gaokao-vault

markdown_extensions:
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - tables
